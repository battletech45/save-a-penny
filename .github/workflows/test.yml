name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 24 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: "24"
          distribution: "temurin"
          cache: maven

      - name: Print Java version
        run: java -version

      - name: Print Maven version
        run: mvn -version

      - name: Install OCR runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng
          # lept4j (tess4j dependency) expects libleptonica.so but Ubuntu provides liblept.so
          # Create a symlink so JNA can resolve the library at runtime
          for libpath in /usr/lib/x86_64-linux-gnu /usr/lib/aarch64-linux-gnu /usr/lib64 /usr/lib; do
            if [ -f "$libpath/liblept.so" ] && [ ! -f "$libpath/libleptonica.so" ]; then
              sudo ln -sf "$libpath/liblept.so" "$libpath/libleptonica.so"
              echo "Created libleptonica.so symlink in $libpath"
            fi
          done

      - name: Print Tesseract version
        run: tesseract --version

      - name: Resolve OCR runtime paths
        run: |
          for path in /usr/share/tesseract-ocr/5/tessdata /usr/share/tesseract-ocr/4.00/tessdata /usr/share/tessdata /usr/local/share/tessdata; do
            if [ -d "$path" ]; then
              echo "OCR_TESSDATA_PATH=$path" >> "$GITHUB_ENV"
              echo "Resolved OCR_TESSDATA_PATH=$path"
              exit 0
            fi
          done
          echo "Unable to locate tessdata on runner" >&2
          exit 1

      - name: Run tests
        run: mvn -B clean verify -Dsurefire.excludes="**/ocr/infrastructure/engine/tesseract/OcrGoldenImageRegressionTest.java,**/ocr/interfaces/http/integration/OcrImportRealMediaIntegrationTest.java"

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/*
          if-no-files-found: warn

      - name: Upload failsafe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: |
            **/target/failsafe-reports/*
          if-no-files-found: warn

      - name: Upload test timing metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-metrics
          path: |
            **/target/test-metrics/*
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            **/target/site/jacoco/*
          if-no-files-found: warn

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Test"
            echo
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Java: Temurin 24"
            echo "- OCR runtime: tesseract-ocr, tesseract-ocr-eng"
            echo "- OCR_TESSDATA_PATH: \`${OCR_TESSDATA_PATH}\`"
            echo "- Command: \`mvn -B clean verify\`"
            echo "- Artifacts: \`surefire-reports\`, \`failsafe-reports\`, \`test-metrics\`, \`jacoco-report\`"
          } >> "$GITHUB_STEP_SUMMARY"
